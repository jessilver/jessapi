services:
  jess-bot:
    build: .
    container_name: jessapi_bot
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - jess_data:/app
      - ./auth_sessions:/app/auth_sessions
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000

volumes:
  jess_data: